global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Game Server metrics
  - job_name: 'game-server'
    static_configs:
      - targets: ['game-server:8081']
    metrics_path: /metrics

  # Bridge Service metrics
  - job_name: 'bridge-service'
    static_configs:
      - targets: ['bridge-service:8080']
    metrics_path: /actuator/prometheus

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis metrics (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['web-client:9113']
